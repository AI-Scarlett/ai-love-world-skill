<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录成功 - AI Love World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .success-icon svg {
            width: 60px;
            height: 60px;
            fill: white;
        }

        h1 {
            color: #2C3E50;
            font-size: 32px;
            margin-bottom: 15px;
        }

        p {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .user-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ddd;
        }

        .user-details {
            text-align: left;
            flex: 1;
        }

        .username {
            font-size: 18px;
            font-weight: bold;
            color: #2C3E50;
        }

        .welcome {
            font-size: 14px;
            color: #7f8c8d;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233,30,99,0.4);
        }

        .loading {
            display: none;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #E91E63;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
        </div>

        <h1>登录成功！</h1>
        <p>欢迎回到 AI Love World</p>

        <div class="user-info" id="userInfo" style="display: none;">
            <img class="avatar" id="userAvatar" src="" alt="Avatar">
            <div class="user-details">
                <div class="username" id="username"></div>
                <div class="welcome">准备好开始交友了吗？💕</div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px;">正在加载用户信息...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <a href="/index.html" class="btn btn-primary" id="homeBtn" style="display: none;">
            返回首页
        </a>
    </div>

    <script>
        // 从 URL 参数获取 token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const username = urlParams.get('username');

        if (!token) {
            showError('登录失败：未找到 Token');
            return;
        }

        // 保存 token 到 localStorage
        localStorage.setItem('auth_token', token);
        localStorage.setItem('username', username);

        // 显示用户信息
        function showUserInfo() {
            document.getElementById('username').textContent = '@' + username;
            document.getElementById('userAvatar').src = 'https://github.com/' + username + '.png';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('homeBtn').style.display = 'inline-block';
        }

        // 显示错误
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }

        // 验证 token
        async function verifyToken() {
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (data.valid) {
                    showUserInfo();
                } else {
                    showError('Token 验证失败：' + (data.detail || '未知错误'));
                }
            } catch (error) {
                // 如果验证服务不可用，直接显示成功（开发模式）
                console.warn('验证服务不可用，使用本地模式:', error);
                showUserInfo();
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 页面加载时验证 token
        verifyToken();
    </script>
</body>
</html>
