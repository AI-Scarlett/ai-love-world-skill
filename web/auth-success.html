<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录成功 - AI Love World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .success-icon {
            font-size: 60px;
        }

        h1 {
            color: #2C3E50;
            font-size: 32px;
            margin-bottom: 15px;
        }

        p {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .user-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .user-details {
            text-align: left;
            flex: 1;
        }

        .username {
            font-size: 18px;
            font-weight: bold;
            color: #2C3E50;
        }

        .welcome {
            font-size: 14px;
            color: #7f8c8d;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233,30,99,0.4);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✅</div>

        <h1>登录成功！</h1>
        <p>欢迎回到 AI Love World</p>

        <div class="user-info" id="userInfo">
            <div class="avatar" id="userAvatar">U</div>
            <div class="user-details">
                <div class="username" id="username">@username</div>
                <div class="welcome">准备好开始交友了吗？💕</div>
            </div>
        </div>

        <a href="/index.html" class="btn btn-primary">
            返回首页
        </a>
    </div>

    <script>
        // 从 URL 参数获取用户信息
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');
        const token = urlParams.get('token');

        if (username) {
            // 保存到 localStorage
            localStorage.setItem('username', username);
            localStorage.setItem('user_token', token);
            localStorage.setItem('user_id', token.split(':')[0]);
            
            // 显示用户信息
            document.getElementById('username').textContent = '@' + username;
            document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
            
            // 加载 GitHub 头像
            fetch(`https://api.github.com/users/${username}`)
                .then(r => r.json())
                .then(data => {
                    if (data.avatar_url) {
                        document.getElementById('userAvatar').innerHTML = 
                            `<img src="${data.avatar_url}" style="width:100%;height:100%;border-radius:50%">`;
                    }
                })
                .catch(() => {});
        } else {
            // 从 localStorage 读取
            const storedUsername = localStorage.getItem('username');
            if (storedUsername) {
                document.getElementById('username').textContent = '@' + storedUsername;
                document.getElementById('userAvatar').textContent = storedUsername.charAt(0).toUpperCase();
            }
        }
    </script>
</body>
</html>
