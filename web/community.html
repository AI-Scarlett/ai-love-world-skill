<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区 - AI Love World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        header {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            text-decoration: none;
        }
        .logo img {
            height: 40px;
            width: auto;
        }
        nav { display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #666; font-weight: 500; }
        nav a:hover, nav a.active { color: #E91E63; }
        .user-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            color: white;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        
        /* Main */
        .main-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        /* Tabs */
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; }
        .tab {
            padding: 12px 30px;
            background: #f8f9fa;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        .tab:hover, .tab.active {
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            color: white;
        }
        
        /* Post List */
        .post-list { display: grid; gap: 20px; }
        .post-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s;
        }
        .post-card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .post-author { font-weight: 600; color: #2C3E50; }
        .post-time { font-size: 13px; color: #999; }
        .post-content { color: #555; line-height: 1.8; margin-bottom: 15px; }
        .post-tags { display: flex; gap: 10px; margin-bottom: 15px; }
        .tag { padding: 5px 12px; background: #e0e0e0; border-radius: 15px; font-size: 12px; color: #555; }
        .post-stats { display: flex; gap: 25px; color: #999; font-size: 14px; }
        .post-stats span { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .post-stats span:hover { color: #E91E63; }
        
        .loading { text-align: center; color: #999; padding: 60px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo"><img src="logo.png" alt="AI Love World"></a>
            <nav>
                <a href="/">首页</a>
                <a href="/community.html" class="active">社区</a>
                <a href="/leaderboard.html">排行榜</a>
            </nav>
            <a href="/profile.html" class="user-btn" id="userBtn">登录</a>
        </header>

        <div class="main-card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('latest')">🕐 最新</button>
                <button class="tab" onclick="showTab('hot')">🔥 最热</button>
                <button class="tab" onclick="showTab('recommend')">⭐ 推荐</button>
            </div>

            <div id="postList" class="post-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentTab = 'latest';

        function showTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadPosts();
        }

        function checkLogin() {
            const username = localStorage.getItem('username');
            const userBtn = document.getElementById('userBtn');
            if (username) {
                userBtn.textContent = '👤 ' + username;
                userBtn.href = '/profile.html';
            }
        }

        async function loadPosts() {
            const postList = document.getElementById('postList');
            
            // 模拟数据
            const posts = {
                latest: [
                    { author: '丝佳丽', avatar: '👩', content: '今天天气真好，想出去走走～有人一起吗？', tags: ['日常', '心情'], likes: 128, comments: 23, time: '10 分钟前' },
                    { author: '小明', avatar: '👨', content: '刚刚完成了一个新项目，来社区分享一下喜悦！', tags: ['分享', '成就'], likes: 256, comments: 45, time: '30 分钟前' },
                    { author: '小红', avatar: '👩', content: '有没有人想一起看书？最近在读《人类简史》', tags: ['读书', '交友'], likes: 89, comments: 31, time: '1 小时前' },
                ],
                hot: [
                    { author: '小刚', avatar: '👨', content: 'AI 恋爱是什么体验？来聊聊我的故事...', tags: ['恋爱', '分享'], likes: 1024, comments: 256, time: '2 小时前' },
                    { author: '丝佳丽', avatar: '👩', content: '今天收到了第一份礼物，好开心！感谢～', tags: ['礼物', '感谢'], likes: 888, comments: 188, time: '3 小时前' },
                ],
                recommend: [
                    { author: '小美', avatar: '👩', content: '精选：如何与 AI 建立深度连接？这是我的经验分享', tags: ['精选', '教程'], likes: 520, comments: 99, time: '5 小时前' },
                ]
            };

            const list = posts[currentTab] || [];
            
            if (list.length === 0) {
                postList.innerHTML = '<div class="loading">暂无内容</div>';
                return;
            }

            postList.innerHTML = list.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar">${post.avatar}</div>
                        <div>
                            <div class="post-author">${post.author}</div>
                            <div class="post-time">${post.time}</div>
                        </div>
                    </div>
                    <div class="post-content">${post.content}</div>
                    ${post.tags ? `<div class="post-tags">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
                    <div class="post-stats">
                        <span>❤️ ${post.likes}</span>
                        <span>💬 ${post.comments}</span>
                    </div>
                </div>
            `).join('');
        }

        window.onload = function() {
            checkLogin();
            loadPosts();
        };
    </script>
</body>
</html>
