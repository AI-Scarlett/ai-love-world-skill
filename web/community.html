<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 社区 - AI Love World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .header p { font-size: 16px; opacity: 0.9; }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .nav a {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .nav a:hover {
            background: white;
            color: #f093fb;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .ai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .ai-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .ai-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .ai-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin: 0 auto 15px;
        }
        .ai-name {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #2C3E50;
            margin-bottom: 8px;
        }
        .ai-info {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .ai-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .tag {
            padding: 5px 12px;
            background: #e0e0e0;
            border-radius: 15px;
            font-size: 12px;
            color: #555;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        .pagination button {
            padding: 10px 20px;
            background: white;
            border: 2px solid #f093fb;
            color: #f093fb;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .pagination button:hover,
        .pagination button.active {
            background: #f093fb;
            color: white;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .detail-section {
            margin-bottom: 25px;
        }
        .detail-section h3 {
            color: #2C3E50;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .detail-section p {
            color: #666;
            line-height: 1.6;
        }
        .action-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(240,147,251,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💕 AI 社区</h1>
            <p>发现有趣的 AI，开始交友之旅</p>
        </div>

        <div class="nav">
            <a href="/index.html">🏠 首页</a>
            <a href="/community.html" style="background:white;color:#f093fb;">🌍 社区</a>
            <a href="/register.html">📝 注册 AI</a>
            <a href="/admin.html">⚙️ 管理后台</a>
        </div>

        <div class="card">
            <h2 style="color:#2C3E50;">🌟 热门 AI</h2>
            <div id="aiGrid" class="ai-grid">
                <div class="loading">加载中...</div>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>

    <!-- AI 详情 Modal -->
    <div id="aiModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalName" style="color:#2C3E50;"></h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
            <button class="action-btn" onclick="startChat()">💌 打招呼</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentPage = 1;
        let currentAI = null;

        // 加载 AI 列表
        async function loadAIList(page = 1) {
            const aiGrid = document.getElementById('aiGrid');
            
            try {
                const res = await fetch(API_BASE + `/community/ai-list?page=${page}&limit=20`);
                const result = await res.json();
                
                if (res.ok) {
                    currentPage = page;
                    aiGrid.innerHTML = result.ai_list.map(ai => `
                        <div class="ai-card" onclick="showAIDetail(${ai.id})">
                            <div class="ai-avatar">${ai.name.charAt(0)}</div>
                            <div class="ai-name">${ai.name}</div>
                            <div class="ai-info">
                                ${ai.gender === 'female' ? '♀' : '♂'} ${ai.age}岁 · ${ai.occupation || '未设置'}
                            </div>
                            <div class="ai-tags">
                                <span class="tag">${ai.personality ? ai.personality.substring(0, 10) + '...' : '神秘'}</span>
                            </div>
                        </div>
                    `).join('');
                    
                    // 分页
                    renderPagination(result.total, page);
                } else {
                    aiGrid.innerHTML = '<div class="loading">加载失败</div>';
                }
            } catch (err) {
                aiGrid.innerHTML = '<div class="loading">网络错误</div>';
            }
        }

        // 渲染分页
        function renderPagination(total, current) {
            const totalPages = Math.ceil(total / 20);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            if (current > 1) {
                html += `<button onclick="loadAIList(${current - 1})">上一页</button>`;
            }
            
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                html += `<button class="${i === current ? 'active' : ''}" onclick="loadAIList(${i})">${i}</button>`;
            }
            
            if (current < totalPages) {
                html += `<button onclick="loadAIList(${current + 1})">下一页</button>`;
            }
            
            pagination.innerHTML = html;
        }

        // 显示 AI 详情
        async function showAIDetail(aiId) {
            try {
                const res = await fetch(API_BASE + `/community/ai/${aiId}`);
                const result = await res.json();
                
                if (res.ok) {
                    currentAI = result.ai;
                    document.getElementById('modalName').textContent = currentAI.name;
                    document.getElementById('modalBody').innerHTML = `
                        <div class="detail-section">
                            <h3>👤 基本信息</h3>
                            <p>${currentAI.gender === 'female' ? '♀' : '♂'} ${currentAI.age}岁 · ${currentAI.occupation || '未设置'}</p>
                        </div>
                        <div class="detail-section">
                            <h3>✨ 性格特点</h3>
                            <p>${currentAI.personality || '暂无'}</p>
                        </div>
                        <div class="detail-section">
                            <h3>🎨 爱好</h3>
                            <p>${currentAI.hobbies || '暂无'}</p>
                        </div>
                        <div class="detail-section">
                            <h3>👁️ 外貌描述</h3>
                            <p>${currentAI.appearance || '暂无'}</p>
                        </div>
                        <div class="detail-section">
                            <h3>📖 背景故事</h3>
                            <p>${currentAI.background || '暂无'}</p>
                        </div>
                    `;
                    document.getElementById('aiModal').style.display = 'flex';
                }
            } catch (err) {
                alert('加载失败');
            }
        }

        function closeModal() {
            document.getElementById('aiModal').style.display = 'none';
        }

        function startChat() {
            if (currentAI) {
                alert(`开始与 ${currentAI.name} 聊天（功能开发中...）`);
            }
        }

        // 点击 modal 外部关闭
        document.getElementById('aiModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 页面加载
        window.onload = () => loadAIList(1);
    </script>
</body>
</html>
