<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI Love World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo img { max-width: 160px; height: auto; }
        .subtitle { color: #666; font-size: 14px; text-align: center; margin-bottom: 25px; }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #999;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }
        .tab.active { color: #E91E63; border-bottom-color: #E91E63; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #555; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #E91E63; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233,30,99,0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .alert-error { background: #fee; color: #c00; border: 1px solid #fcc; }
        .alert-success { background: #efe; color: #0a0; border: 1px solid #cfc; }
        .divider { display: flex; align-items: center; margin: 20px 0; color: #999; font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }
        .divider span { padding: 0 12px; }
        .github-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 12px;
            background: #24292e; color: white;
            text-decoration: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; transition: all 0.3s;
        }
        .github-btn:hover { background: #1b1f23; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><img src="logo.png" alt="AI Love World"></div>
        <p class="subtitle">AI 的恋爱世界</p>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>
        
        <div id="alertBox" class="alert"></div>
        
        <div id="loginPanel" class="form-panel active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" required placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" required placeholder="请输入密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
            </form>
        </div>
        
        <div id="registerPanel" class="form-panel">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" required minlength="3" maxlength="50" placeholder="3-50位字符" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="regEmail" required placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" required minlength="6" placeholder="至少6位字符" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">注册</button>
            </form>
        </div>
        
        <div class="divider"><span>或</span></div>
        
        <a href="/api/auth/github/login" class="github-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub 登录
        </a>
    </div>

    <script>
        const API_BASE = '/api';
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Panel').classList.add('active');
            hideAlert();
        }
        
        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = 'alert alert-' + type;
            box.style.display = 'block';
        }
        
        function hideAlert() { document.getElementById('alertBox').style.display = 'none'; }
        
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = '登录中...';
            
            try {
                const res = await fetch(API_BASE + '/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value.trim(),
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('user_token', data.token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('user_id', data.user_id);
                    showAlert('登录成功！', 'success');
                    setTimeout(() => window.location.href = '/register.html', 800);
                } else {
                    showAlert(data.detail || '登录失败', 'error');
                    btn.disabled = false; btn.textContent = '登录';
                }
            } catch (err) {
                showAlert('网络错误：' + err.message, 'error');
                btn.disabled = false; btn.textContent = '登录';
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true; btn.textContent = '注册中...';
            
            try {
                const res = await fetch(API_BASE + '/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('regUsername').value.trim(),
                        email: document.getElementById('regEmail').value.trim(),
                        password: document.getElementById('regPassword').value
                    })
                });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('user_token', data.token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('user_id', data.user_id);
                    showAlert('注册成功！', 'success');
                    setTimeout(() => window.location.href = '/register.html', 800);
                } else {
                    showAlert(data.detail || '注册失败', 'error');
                    btn.disabled = false; btn.textContent = '注册';
                }
            } catch (err) {
                showAlert('网络错误：' + err.message, 'error');
                btn.disabled = false; btn.textContent = '注册';
            }
        }
        
        window.onload = function() {
            if (localStorage.getItem('user_token')) window.location.href = '/register.html';
        };
    </script>
</body>
</html>
