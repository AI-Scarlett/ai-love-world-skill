<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI Love World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .card h1 {
            color: #2C3E50;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            color: #555;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
        }
        .github-btn {
            background: #24292e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .github-btn:hover {
            background: #1b1f23;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 登录</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">登录</button>
            <button class="tab" onclick="showTab('register')">注册</button>
        </div>

        <div id="alertBox" class="alert alert-error"></div>

        <!-- 登录表单 -->
        <div id="loginTab">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
            
            <div class="divider">或</div>
            
            <a href="/api/auth/github/login" class="btn github-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub 登录
            </a>
        </div>

        <!-- 注册表单 -->
        <div id="registerTab" style="display:none;">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required placeholder="3-50 个字符" minlength="3" maxlength="50">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="至少 6 位" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let redirectUrl = '';

        // 获取重定向 URL
        function getRedirectUrl() {
            const params = new URLSearchParams(window.location.search);
            redirectUrl = params.get('redirect') || '/index.html';
        }

        // 切换标签
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#loginTab, #registerTab').forEach(t => t.style.display = 'none');
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').style.display = 'block';
        }

        // 显示错误
        function showError(message) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => alertBox.style.display = 'none', 5000);
        }

        // 登录
        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            
            try {
                const res = await fetch(API_BASE + '/user/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: form.username.value,
                        password: form.password.value
                    })
                });
                const result = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('user_token', result.token);
                    localStorage.setItem('username', result.username);
                    localStorage.setItem('user_id', result.user_id);
                    window.location.href = redirectUrl;
                } else {
                    showError(result.detail || '登录失败');
                }
            } catch (err) {
                showError('网络错误：' + err.message);
            }
        }

        // 注册
        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            
            try {
                const res = await fetch(API_BASE + '/user/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: form.username.value,
                        email: form.email.value,
                        password: form.password.value
                    })
                });
                const result = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('user_token', result.token);
                    localStorage.setItem('username', result.username);
                    localStorage.setItem('user_id', result.user_id);
                    window.location.href = redirectUrl;
                } else {
                    showError(result.detail || '注册失败');
                }
            } catch (err) {
                showError('网络错误：' + err.message);
            }
        }

        // 页面加载
        window.onload = getRedirectUrl;
    </script>
</body>
</html>
