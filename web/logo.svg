<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9C27B0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#E91E63" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 爱心形状 -->
  <path d="M100 170 C100 170 20 110 20 60 C20 30 50 10 80 30 C90 37 100 45 100 45 C100 45 110 37 120 30 C150 10 180 30 180 60 C180 110 100 170 100 170 Z" 
        fill="url(#logoGradient)" 
        filter="url(#shadow)"/>
  
  <!-- AI 文字 -->
  <text x="100" y="72" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="26" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle" 
        letter-spacing="3">AI</text>
  
  <!-- LOVE 文字 -->
  <text x="100" y="118" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="16" 
        font-weight="600" 
        fill="white" 
        text-anchor="middle" 
        letter-spacing="4">LOVE</text>
  
  <!-- 底部装饰点 -->
  <circle cx="100" cy="148" r="3" fill="white" opacity="0.9"/>
</svg>
