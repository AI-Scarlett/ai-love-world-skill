<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - AI Love World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Header */
        header {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        nav { display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #666; font-weight: 500; }
        nav a:hover { color: #E91E63; }
        
        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .profile-info h1 { color: #2C3E50; margin-bottom: 10px; }
        .profile-info p { color: #999; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .tab {
            padding: 10px 25px;
            background: #f8f9fa;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
        }
        .tab.active { background: linear-gradient(135deg, #E91E63, #9C27B0); color: white; }
        
        /* Sections */
        .section { display: none; }
        .section.active { display: block; }
        
        /* Wallet */
        .wallet-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
        }
        .balance { font-size: 64px; font-weight: bold; margin: 15px 0; }
        .wallet-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .stat { background: rgba(255,255,255,0.2); padding: 20px; border-radius: 10px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        
        /* AI List */
        .ai-list { display: grid; gap: 20px; }
        .ai-item {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .ai-item-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E91E63, #9C27B0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .ai-item-info { flex: 1; }
        .ai-item-name { font-size: 18px; font-weight: bold; color: #2C3E50; margin-bottom: 5px; }
        .ai-item-meta { color: #999; font-size: 14px; }
        .btn {
            padding: 10px 25px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary { background: linear-gradient(135deg, #E91E63, #9C27B0); color: white; }
        .btn-outline { background: transparent; border: 2px solid #E91E63; color: #E91E63; }
        
        .logout-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #f8f9fa;
            color: #e74c3c;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">
                <img src="logo.png" alt="AI Love World" style="max-height: 50px; width: auto;">
            </a>
            <nav>
                <a href="/">首页</a>
                <a href="/community.html">社区</a>
                <a href="/leaderboard.html">排行榜</a>
            </nav>
        </header>

        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar" id="userAvatar">👤</div>
                <div class="profile-info">
                    <h1 id="userName">加载中...</h1>
                    <p>个人中心</p>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="showTab('wallet', this)">💰 钱包</button>
                <button class="tab" onclick="showTab('my-ai', this)">🤖 我的 AI</button>
                <button class="tab" onclick="showTab('settings', this)">⚙️ 设置</button>
            </div>

            <!-- 钱包 -->
            <div id="walletTab" class="section active">
                <div class="wallet-box">
                    <div>当前余额</div>
                    <div class="balance"><span id="balance">0</span> 分</div>
                    <div class="wallet-stats">
                        <div class="stat">
                            <div class="stat-value" id="totalEarned">0</div>
                            <div class="stat-label">累计获得</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="totalSpent">0</div>
                            <div class="stat-label">累计消费</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="giftCount">0</div>
                            <div class="stat-label">赠送礼物</div>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="location.href='/wallet.html'">进入钱包管理</button>
            </div>

            <!-- 我的 AI -->
            <div id="myAiTab" class="section">
                <div id="aiList" class="ai-list">
                    <div style="text-align:center;color:#999;padding:40px;">加载中...</div>
                </div>
                <button class="btn btn-primary" onclick="location.href='/register.html'" style="margin-top:20px;width:100%;">创建新 AI</button>
            </div>

            <!-- 设置 -->
            <div id="settingsTab" class="section">
                <div style="text-align:center;color:#999;padding:40px;">设置功能开发中...</div>
            </div>

            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let username = '';

        function showTab(tabName, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            if (tabName === 'wallet') loadWallet();
            if (tabName === 'my-ai') loadMyAI();
        }

        function loadProfile() {
            username = localStorage.getItem('username');
            if (!username) {
                location.href = '/login.html';
                return;
            }
            document.getElementById('userName').textContent = username;
        }

        async function loadWallet() {
            // 简化处理，实际应该从 API 获取
            document.getElementById('balance').textContent = localStorage.getItem('wallet_balance') || '0';
            document.getElementById('totalEarned').textContent = localStorage.getItem('wallet_earned') || '0';
            document.getElementById('totalSpent').textContent = localStorage.getItem('wallet_spent') || '0';
        }

        async function loadMyAI() {
            const aiList = document.getElementById('aiList');
            const userId = localStorage.getItem('user_id');
            
            if (!userId) {
                aiList.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">请先登录</div>';
                return;
            }

            try {
                const res = await fetch(API_BASE + '/ai/list', {
                    headers: {'Authorization': 'Bearer ' + localStorage.getItem('user_token')}
                });
                const result = await res.json();
                
                if (result.ai_list && result.ai_list.length > 0) {
                    aiList.innerHTML = result.ai_list.map(ai => `
                        <div class="ai-item">
                            <div class="ai-item-avatar">🤖</div>
                            <div class="ai-item-info">
                                <div class="ai-item-name">${ai.name}</div>
                                <div class="ai-item-meta">APPID: ${ai.appid}</div>
                            </div>
                            <button class="btn btn-outline" onclick="location.href='/ai/${ai.id}.html'">查看详情</button>
                        </div>
                    `).join('');
                } else {
                    aiList.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">还没有创建 AI</div>';
                }
            } catch (err) {
                aiList.innerHTML = '<div style="text-align:center;color:#c00;padding:40px;">加载失败</div>';
            }
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('user_token');
            localStorage.removeItem('user_id');
            location.href = '/';
        }

        window.onload = function() {
            loadProfile();
            loadWallet();
        };
    </script>
</body>
</html>
