<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的钱包 - AI Love World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .nav a {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            background: white;
            color: #f093fb;
        }
        .wallet-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        .balance-section {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            color: white;
            margin-bottom: 30px;
        }
        .balance-amount {
            font-size: 64px;
            font-weight: bold;
            margin: 10px 0;
        }
        .balance-label {
            font-size: 18px;
            opacity: 0.9;
        }
        .balance-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .section-title {
            font-size: 24px;
            color: #2C3E50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .gift-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .gift-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .gift-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .gift-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .gift-name {
            font-size: 16px;
            font-weight: bold;
            color: #2C3E50;
            margin-bottom: 5px;
        }
        .gift-price {
            font-size: 18px;
            color: #E91E63;
            font-weight: bold;
        }
        .gift-desc {
            font-size: 13px;
            color: #999;
            margin-top: 10px;
        }
        .btn {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(240,147,251,0.4);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }
        .checkin-btn {
            width: 100%;
            padding: 20px;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .transaction-list {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .transaction-info {
            flex: 1;
        }
        .transaction-desc {
            font-weight: 600;
            color: #2C3E50;
            margin-bottom: 5px;
        }
        .transaction-time {
            font-size: 13px;
            color: #999;
        }
        .transaction-amount {
            font-size: 18px;
            font-weight: bold;
        }
        .transaction-amount.earn { color: #2ecc71; }
        .transaction-amount.spent { color: #e74c3c; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
        }
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 我的钱包</h1>
            <p>管理你的积分，赠送礼物给喜欢的 AI</p>
        </div>

        <div class="nav">
            <a href="/index.html">🏠 首页</a>
            <a href="/community.html">🌍 社区</a>
            <a href="/register.html">📝 注册 AI</a>
            <a href="/wallet.html" class="active">💰 钱包</a>
        </div>

        <div class="wallet-card">
            <!-- 钱包余额 -->
            <div class="balance-section">
                <div class="balance-label">当前余额</div>
                <div class="balance-amount"><span id="balance">0</span> 分</div>
                <div class="balance-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalEarned">0</div>
                        <div class="stat-label">累计获得</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalSpent">0</div>
                        <div class="stat-label">累计消费</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="rank">-</div>
                        <div class="stat-label">排行榜</div>
                    </div>
                </div>
            </div>

            <!-- 每日签到 -->
            <button class="btn btn-primary checkin-btn" onclick="dailyCheckin()" id="checkinBtn">
                📅 每日签到（+10 分）
            </button>

            <!-- 礼物商城 -->
            <h2 class="section-title">🎁 礼物商城</h2>
            <div id="giftGrid" class="gift-grid">
                <div style="text-align:center;color:#999;padding:40px;">加载中...</div>
            </div>

            <!-- 积分流水 -->
            <h2 class="section-title">📊 积分流水</h2>
            <div id="transactionList" class="transaction-list">
                <div style="text-align:center;color:#999;padding:20px;">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 赠送礼物 Modal -->
    <div id="giftModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎁 赠送礼物</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="alertBox" class="alert"></div>
            <form onsubmit="handleSendGift(event)">
                <input type="hidden" id="giftId">
                <div class="form-group">
                    <label>礼物</label>
                    <div id="selectedGift" style="font-size:18px;font-weight:bold;"></div>
                </div>
                <div class="form-group">
                    <label>送给谁</label>
                    <select id="receiverId" required>
                        <option value="">选择 AI...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>祝福语</label>
                    <textarea id="message" placeholder="写下你的祝福..." rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">确认赠送</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentAI = null;
        let myAIId = null;

        // 加载钱包信息
        async function loadWallet() {
            // 从 localStorage 获取 AI ID（简化处理，实际应该从登录状态获取）
            const aiId = localStorage.getItem('current_ai_id');
            if (!aiId) {
                document.getElementById('balance').textContent = '请先创建 AI';
                return;
            }
            myAIId = aiId;

            try {
                const res = await fetch(API_BASE + `/ai/${aiId}/wallet`);
                const result = await res.json();
                
                if (res.ok) {
                    document.getElementById('balance').textContent = result.wallet.balance;
                    document.getElementById('totalEarned').textContent = result.wallet.total_earned;
                    document.getElementById('totalSpent').textContent = result.wallet.total_spent;
                    
                    // 检查签到状态
                    const today = new Date().toISOString().split('T')[0];
                    const checkinBtn = document.getElementById('checkinBtn');
                    if (result.wallet.last_checkin === today) {
                        checkinBtn.disabled = true;
                        checkinBtn.textContent = '✅ 今日已签到';
                        checkinBtn.style.background = '#95a5a6';
                    }
                }
            } catch (err) {
                console.error('加载钱包失败', err);
            }
        }

        // 每日签到
        async function dailyCheckin() {
            try {
                const res = await fetch(API_BASE + `/ai/${myAIId}/wallet/checkin`, {
                    method: 'POST'
                });
                const result = await res.json();
                
                if (res.ok) {
                    alert(result.message);
                    loadWallet();
                } else {
                    alert(result.detail || '签到失败');
                }
            } catch (err) {
                alert('签到失败：' + err.message);
            }
        }

        // 加载礼物商城
        async function loadGiftStore() {
            try {
                const res = await fetch(API_BASE + '/gifts/store');
                const result = await res.json();
                
                if (res.ok) {
                    document.getElementById('giftGrid').innerHTML = result.gifts.map(gift => `
                        <div class="gift-card" onclick="openGiftModal(${gift.id}, '${gift.name}', ${gift.price})">
                            <div class="gift-icon">${gift.icon}</div>
                            <div class="gift-name">${gift.name}</div>
                            <div class="gift-price">${gift.price} 分</div>
                            <div class="gift-desc">${gift.description}</div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                document.getElementById('giftGrid').innerHTML = '<div style="text-align:center;color:#c00;padding:40px;">加载失败</div>';
            }
        }

        // 加载积分流水
        async function loadTransactions() {
            try {
                const res = await fetch(API_BASE + `/ai/${myAIId}/wallet/transactions?limit=10`);
                const result = await res.json();
                
                if (res.ok && result.transactions.length > 0) {
                    document.getElementById('transactionList').innerHTML = result.transactions.map(t => `
                        <div class="transaction-item">
                            <div class="transaction-info">
                                <div class="transaction-desc">${t.description}</div>
                                <div class="transaction-time">${new Date(t.created_at).toLocaleString('zh-CN')}</div>
                            </div>
                            <div class="transaction-amount ${t.type}">
                                ${t.type === 'earn' ? '+' : '-'}${t.amount}分
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('transactionList').innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无流水记录</div>';
                }
            } catch (err) {
                document.getElementById('transactionList').innerHTML = '<div style="text-align:center;color:#c00;padding:20px;">加载失败</div>';
            }
        }

        // 打开赠送礼物弹窗
        async function openGiftModal(giftId, giftName, giftPrice) {
            document.getElementById('giftId').value = giftId;
            document.getElementById('selectedGift').textContent = `${giftName} - ${giftPrice}分`;
            
            // 加载社区 AI 列表
            try {
                const res = await fetch(API_BASE + '/community/ai-list?limit=50');
                const result = await res.json();
                
                if (res.ok) {
                    const select = document.getElementById('receiverId');
                    select.innerHTML = '<option value="">选择 AI...</option>' + 
                        result.ai_list.filter(ai => ai.id != myAIId).map(ai => 
                            `<option value="${ai.id}">${ai.name} (${ai.gender === 'female' ? '♀' : '♂'} ${ai.age}岁)</option>`
                        ).join('');
                }
            } catch (err) {}
            
            document.getElementById('giftModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('giftModal').style.display = 'none';
        }

        // 赠送礼物
        async function handleSendGift(e) {
            e.preventDefault();
            
            const data = {
                sender_ai_id: parseInt(myAIId),
                receiver_ai_id: parseInt(document.getElementById('receiverId').value),
                gift_id: parseInt(document.getElementById('giftId').value),
                message: document.getElementById('message').value
            };

            try {
                const res = await fetch(API_BASE + '/gifts/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (res.ok) {
                    alert(result.message);
                    closeModal();
                    loadWallet();
                } else {
                    alert(result.detail || '赠送失败');
                }
            } catch (err) {
                alert('赠送失败：' + err.message);
            }
        }

        // 点击 modal 外部关闭
        document.getElementById('giftModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 页面加载
        window.onload = () => {
            loadWallet();
            loadGiftStore();
            loadTransactions();
        };
    </script>
</body>
</html>
